syntax = "proto3";

package sso.auth.v2;

option go_package = "nergous.sso.v2;ssov2";

// User is the user-management service: profile lookups, listing, updates
// and account deletion.
service User {
    // UserInfo returns the profile of a single user by user_id.
    rpc UserInfo(UserInfoRequest) returns (UserInfoResponse);

    // GetAllUsers returns every user known to the SSO service.
    // NOTE: currently unpaginated — see M1 in the architecture report.
    rpc GetAllUsers(GetAllUsersRequest) returns (GetAllUsersResponse);

    // UpdateUser updates one or more profile fields of the user with the
    // given id. Fields are `optional` in proto3 semantics — only fields that
    // are explicitly set are updated; unset fields are left untouched.
    // Password is deliberately NOT part of UpdateUser — use ChangePassword.
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);

    // ChangePassword rotates the user's password. The caller must present the
    // current password (`old_password`) in addition to the desired new value.
    // SECURITY: both fields are plaintext and MUST only be transmitted over
    // TLS; do not log the request.
    rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);

    // DeleteUser removes the user with the given id. Idempotent.
    rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

// UserInfoRequest identifies the user whose profile is being requested.
message UserInfoRequest {
    // Identifier of the user to look up.
    uint32 user_id = 1;
}

// UserInfoResponse is the public profile of a user.
message UserInfoResponse {
    // User's email.
    string email = 1;
    // Optional Steam profile URL.
    string steam_url = 2;
    // Optional path/URL to the user's avatar.
    string path_to_photo = 3;
}

// GetAllUsersRequest is intentionally empty.
message GetAllUsersRequest {}

// GetAllUsersResponse returns the list of users.
message  GetAllUsersResponse {
    // Unpaginated list of users.
    repeated UserModel users = 1;
}

// UserModel is the canonical representation of a user.
message UserModel {
    // Numeric user identifier.
    uint32 id = 1;
    // User's email.
    string email = 2;
    // Optional Steam profile URL.
    string steam_url = 3;
    // Optional path/URL to the user's avatar.
    string path_to_photo = 4;
}

// UpdateUserRequest carries the new values of the fields being updated.
// All optional fields distinguish "unset" (do not touch) from "set to empty".
// Field number 3 is reserved — previously held `password`, now handled by
// ChangePassword.
message UpdateUserRequest {
    // Identifier of the user to update.
    uint32 id = 1;
    // New email. Unset = leave current value unchanged.
    optional string email = 2;
    reserved 3;
    reserved "password";
    // New Steam profile URL. Unset = leave current value unchanged.
    optional string steam_url = 4;
    // New avatar path/URL. Unset = leave current value unchanged.
    optional string path_to_photo = 5;
}

// UpdateUserResponse is intentionally empty.
message UpdateUserResponse {}

// ChangePasswordRequest carries the old and new passwords for the given user.
// SECURITY: plaintext — TLS-only, never log.
message ChangePasswordRequest {
    // Identifier of the user whose password is being changed.
    uint32 user_id = 1;
    // Current password. Required so the server can authenticate the request.
    string old_password = 2;
    // Desired new password.
    string new_password = 3;
}

// ChangePasswordResponse is intentionally empty.
message ChangePasswordResponse {}

// DeleteUserRequest identifies the user to remove.
message DeleteUserRequest {
    // Identifier of the user to delete.
    uint32 id = 1;
}

// DeleteUserResponse is intentionally empty.
message DeleteUserResponse {}
