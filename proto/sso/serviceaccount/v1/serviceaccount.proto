syntax = "proto3";

package sso.serviceaccount.v1;

import "buf/validate/validate.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/Nergous/sso_protos/gen/go/sso/serviceaccount/v1;ssoserviceaccountv1";

// ============================================================================
// ServiceAccountService - Backend-to-backend identities
// ============================================================================
// A ServiceAccount represents a non-human caller (background worker,
// cron job, another backend microservice) that needs to authenticate
// to SSO and hold roles, without any of the user-facing machinery
// (no password, no MFA, no recovery codes, no session-owner UX).
//
// Credential model:
//   client_id       - public identifier (shown in audit logs, config)
//   client_secret   - high-entropy secret, shown ONLY at creation or
//                     rotation; server stores a hash
//
// Authentication:
//   sso.auth.v1.AuthService.AuthenticateServiceAccount exchanges
//   (client_id, client_secret) for AuthTokens. The issued access_token
//   has subject_type = SERVICE_ACCOUNT; CheckPermission treats the
//   service_account_id exactly like a user_id for role-assignment
//   purposes (assignments live in sso.access.v1.AccessService).
//
// Lifecycle:
//   ACTIVE   - enabled, can authenticate
//   DISABLED - cannot authenticate (AuthenticateServiceAccount fails
//              with FAILED_PRECONDITION); role assignments preserved
//   (deleted) - PermanentlyDeleteServiceAccount removes everything;
//               cascade to role assignments is implicit
//
// Security notes:
//   - client_secret is returned exactly twice in the API lifetime:
//     CreateServiceAccount and RotateCredentials. Both responses are
//     debug_redact. Callers are responsible for persisting the secret
//     out-of-band (env var, secret manager, etc.).
//   - No "self-service" endpoints: creating/rotating service accounts
//     is a privileged administrative operation, audited by the caller's
//     user_id (AuditEvent.actor).
//
// Security:
//   All RPCs are authenticated; access is role-based.
//     SA_READ   - GetServiceAccount, ListServiceAccounts
//     SA_WRITE  - CreateServiceAccount, UpdateServiceAccount,
//                 Enable/Disable, RotateCredentials
//     SA_DELETE - PermanentlyDeleteServiceAccount
// ============================================================================
service ServiceAccountService {
    // GetServiceAccount returns a service account by UUID.
    //
    // Errors:
    //   NOT_FOUND         - service account does not exist
    //   PERMISSION_DENIED - caller lacks SA_READ
    //   INVALID_ARGUMENT  - service_account_id is not a valid UUID
    rpc GetServiceAccount(GetServiceAccountRequest) returns (ServiceAccount);

    // ListServiceAccounts returns a paginated list of service accounts.
    //
    // Errors:
    //   PERMISSION_DENIED - caller lacks SA_READ
    //   INVALID_ARGUMENT  - invalid page_size / page_token / filters
    rpc ListServiceAccounts(ListServiceAccountsRequest) returns (ListServiceAccountsResponse);

    // CreateServiceAccount provisions a new service account and issues
    // the initial credentials. The client_secret is returned exactly
    // ONCE in the response - the server stores only a hash.
    //
    // Errors:
    //   ALREADY_EXISTS    - a service account with this name already exists
    //   PERMISSION_DENIED - caller lacks SA_WRITE
    //   INVALID_ARGUMENT  - name / description failed validation
    rpc CreateServiceAccount(CreateServiceAccountRequest) returns (CreateServiceAccountResponse);

    // UpdateServiceAccount partially updates a service account.
    // Uses FieldMask (AIP-134) and etag (AIP-154).
    //
    // Valid mask paths: name, description.
    //
    // Errors:
    //   NOT_FOUND         - service account does not exist
    //   ABORTED           - etag mismatch (ERROR_REASON_ETAG_MISMATCH)
    //   ALREADY_EXISTS    - rename collides with an existing account
    //   PERMISSION_DENIED - caller lacks SA_WRITE
    //   INVALID_ARGUMENT  - empty mask, unknown mask path, invalid value
    rpc UpdateServiceAccount(UpdateServiceAccountRequest) returns (ServiceAccount);

    // RotateCredentials issues a fresh client_secret for an existing
    // service account and invalidates the previous one. The new secret
    // is returned ONCE; all services using the old secret must be
    // updated to use the new one.
    //
    // Requires an etag matching the current ServiceAccount.etag (guards
    // against racing rotation).
    //
    // Errors:
    //   NOT_FOUND         - service account does not exist
    //   ABORTED           - etag mismatch (ERROR_REASON_ETAG_MISMATCH)
    //   PERMISSION_DENIED - caller lacks SA_WRITE
    //   INVALID_ARGUMENT  - service_account_id is not a valid UUID, or
    //                       etag missing/malformed
    rpc RotateCredentials(RotateCredentialsRequest) returns (ServiceAccountCredentials);

    // DisableServiceAccount marks the account as DISABLED. Idempotent.
    // AuthenticateServiceAccount for disabled accounts fails with
    // FAILED_PRECONDITION; existing role assignments are preserved so
    // the account can be re-enabled later.
    //
    // If allow_missing=true, NOT_FOUND is converted to a no-op.
    //
    // Errors:
    //   NOT_FOUND         - service account does not exist (unless allow_missing)
    //   PERMISSION_DENIED - caller lacks SA_WRITE
    rpc DisableServiceAccount(DisableServiceAccountRequest) returns (google.protobuf.Empty);

    // EnableServiceAccount transitions the account back to ACTIVE.
    // Idempotent. See DisableServiceAccountRequest.allow_missing.
    //
    // Errors:
    //   NOT_FOUND         - service account does not exist (unless allow_missing)
    //   PERMISSION_DENIED - caller lacks SA_WRITE
    rpc EnableServiceAccount(EnableServiceAccountRequest) returns (google.protobuf.Empty);

    // PermanentlyDeleteServiceAccount removes the service account
    // permanently. Requires an etag matching the current server value
    // as explicit confirmation. Cascade is implicit: all role assignments
    // for this service account are removed atomically.
    //
    // Errors:
    //   NOT_FOUND         - service account does not exist
    //   ABORTED           - etag mismatch (ERROR_REASON_ETAG_MISMATCH)
    //   PERMISSION_DENIED - caller lacks SA_DELETE
    //   INVALID_ARGUMENT  - etag missing, malformed, or "*"
    rpc PermanentlyDeleteServiceAccount(PermanentlyDeleteServiceAccountRequest) returns (google.protobuf.Empty);
}

// ============================================================================
// ServiceAccountStatus
// ============================================================================
enum ServiceAccountStatus {
    SERVICE_ACCOUNT_STATUS_UNSPECIFIED = 0;

    // Can authenticate and hold role assignments.
    SERVICE_ACCOUNT_STATUS_ACTIVE = 1;

    // Cannot authenticate; role assignments preserved. Reversible via
    // EnableServiceAccount.
    SERVICE_ACCOUNT_STATUS_DISABLED = 2;

    // Reserved for future lifecycle states.
    reserved 100 to 199;
}

// ============================================================================
// ListServiceAccountsOrderBy - supported sort orders (AIP-132 typed)
// ============================================================================
enum ListServiceAccountsOrderBy {
    LIST_SERVICE_ACCOUNTS_ORDER_BY_UNSPECIFIED = 0;

    LIST_SERVICE_ACCOUNTS_ORDER_BY_CREATED_AT_DESC = 1;
    LIST_SERVICE_ACCOUNTS_ORDER_BY_CREATED_AT_ASC = 2;
    LIST_SERVICE_ACCOUNTS_ORDER_BY_NAME_DESC = 3;
    LIST_SERVICE_ACCOUNTS_ORDER_BY_NAME_ASC = 4;
    LIST_SERVICE_ACCOUNTS_ORDER_BY_LAST_AUTHENTICATED_AT_DESC = 5;
    LIST_SERVICE_ACCOUNTS_ORDER_BY_LAST_AUTHENTICATED_AT_ASC = 6;

    reserved 100 to 199;
}

// ============================================================================
// ServiceAccount - canonical service-account record (response type)
// ============================================================================
// Field-level constraints are enforced on input (CreateServiceAccount,
// UpdateServiceAccount).
message ServiceAccount {
    // UUID of the service account.
    string service_account_id = 1;

    // Public client identifier used in AuthenticateServiceAccount.
    // Generated by the server at creation; immutable; shown in audit logs.
    string client_id = 2;

    // Human-readable name (1-128 chars, unique across all service accounts).
    string name = 3 [
        (buf.validate.field).string.min_len = 1,
        (buf.validate.field).string.max_len = 128
    ];

    // Optional free-form description (0-1024 chars).
    string description = 4 [(buf.validate.field).string.max_len = 1024];

    // Lifecycle status. Server-assigned on create (always ACTIVE); on
    // update this path is invalid - use Enable/Disable RPCs.
    ServiceAccountStatus status = 5;

    // Optimistic concurrency token (AIP-154).
    string etag = 6;

    google.protobuf.Timestamp created_at = 7;
    google.protobuf.Timestamp updated_at = 8;

    // Last successful AuthenticateServiceAccount call. Absent if the
    // account has never been used.
    optional google.protobuf.Timestamp last_authenticated_at = 9;
}

// ============================================================================
// ServiceAccountCredentials - issued once at creation / rotation
// ============================================================================
// client_secret is shown exactly ONCE and cannot be re-retrieved. The
// consumer MUST persist it immediately (env var, secret manager, etc.).
message ServiceAccountCredentials {
    // The fully-populated service-account record after the operation.
    ServiceAccount account = 1;

    // Secret; displayed once. Rotate via RotateCredentials to revoke.
    string client_secret = 2 [debug_redact = true];

    // When this credential pair was issued.
    google.protobuf.Timestamp issued_at = 3;
}

// ============================================================================
// GetServiceAccountRequest
// ============================================================================
message GetServiceAccountRequest {
    string service_account_id = 1 [(buf.validate.field).string.uuid = true];
}

// ============================================================================
// ServiceAccountFilters - filtering options for ListServiceAccounts
// ============================================================================
message ServiceAccountFilters {
    // Case-insensitive substring search over name and description.
    string search = 1 [(buf.validate.field).string.max_len = 128];

    // Filter by lifecycle status (OR logic). Empty list = no filter.
    repeated ServiceAccountStatus statuses = 2 [
        (buf.validate.field).repeated.max_items = 3
    ];
}

// ============================================================================
// ListServiceAccountsRequest
// ============================================================================
message ListServiceAccountsRequest {
    int32 page_size = 1 [
        (buf.validate.field).int32.gte = 0,
        (buf.validate.field).int32.lte = 1000
    ];

    string page_token = 2;

    ServiceAccountFilters filters = 3;

    // Typed sort order (AIP-132). UNSPECIFIED selects the server default.
    ListServiceAccountsOrderBy order_by = 4;
}

// ============================================================================
// ListServiceAccountsResponse
// ============================================================================
message ListServiceAccountsResponse {
    repeated ServiceAccount service_accounts = 1;
    string next_page_token = 2;
    optional int32 total_size = 3;
}

// ============================================================================
// CreateServiceAccountRequest - AIP-133 create
// ============================================================================
// Shape: the resource to create (`service_account`). Server-managed
// fields (service_account_id, client_id, status, etag, timestamps,
// last_authenticated_at) are ignored if populated in the payload.
//
// Fields the client MUST populate in `service_account`:
//   name
// Fields the client MAY populate:
//   description
message CreateServiceAccountRequest {
    ServiceAccount service_account = 1;
}

// ============================================================================
// CreateServiceAccountResponse - includes the one-time client_secret
// ============================================================================
message CreateServiceAccountResponse {
    ServiceAccountCredentials credentials = 1;
}

// ============================================================================
// UpdateServiceAccountRequest - FieldMask-based partial update (AIP-134)
// ============================================================================
// Valid mask paths (SERVER MUST REJECT any other path with INVALID_ARGUMENT):
//   name
//   description
//
// Explicitly INVALID mask paths:
//   service_account_id, client_id (immutable identity / credential)
//   status                         (use Enable/Disable RPCs)
//   etag                           (server-managed; top-level etag field)
//   created_at, updated_at, last_authenticated_at (output-only)
message UpdateServiceAccountRequest {
    string service_account_id = 1 [(buf.validate.field).string.uuid = true];
    ServiceAccount service_account = 2;
    google.protobuf.FieldMask update_mask = 3;
    string etag = 4 [(buf.validate.field).string.min_len = 1];
}

// ============================================================================
// RotateCredentialsRequest - issue a new client_secret
// ============================================================================
// The old secret is invalidated atomically with issuance of the new
// one. All running services authenticating with the old secret will
// start getting UNAUTHENTICATED on their next call and must be updated.
message RotateCredentialsRequest {
    string service_account_id = 1 [(buf.validate.field).string.uuid = true];

    // Current ServiceAccount.etag observed by the caller. Guards
    // against racing rotations ("who rotated last" confusion).
    string etag = 2 [(buf.validate.field).string.min_len = 1];
}

// ============================================================================
// DisableServiceAccountRequest
// ============================================================================
message DisableServiceAccountRequest {
    string service_account_id = 1 [(buf.validate.field).string.uuid = true];

    // When true, missing service_account_id returns OK instead of
    // NOT_FOUND (AIP-135).
    bool allow_missing = 2;
}

// ============================================================================
// EnableServiceAccountRequest
// ============================================================================
message EnableServiceAccountRequest {
    string service_account_id = 1 [(buf.validate.field).string.uuid = true];

    // See DisableServiceAccountRequest.allow_missing.
    bool allow_missing = 2;
}

// ============================================================================
// PermanentlyDeleteServiceAccountRequest
// ============================================================================
// Requires an etag matching the current ServiceAccount.etag as explicit
// confirmation. Cascade is implicit: all role assignments for this
// account in sso.access.v1.AccessService are removed atomically.
message PermanentlyDeleteServiceAccountRequest {
    string service_account_id = 1 [(buf.validate.field).string.uuid = true];

    // Current ServiceAccount.etag observed by the caller. "*" is NOT
    // accepted - hard-delete must be a deliberate, non-unconditional act.
    string etag = 2 [
        (buf.validate.field).string.min_len = 1,
        (buf.validate.field).cel = {
            id: "etag.no_wildcard",
            message: "etag '*' is not permitted for PermanentlyDeleteServiceAccount",
            expression: "this != '*'"
        }
    ];
}
