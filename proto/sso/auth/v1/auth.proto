syntax = "proto3";

package sso.auth.v1;

import "buf/validate/validate.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "sso/identity/v1/identity.proto";

option go_package = "github.com/Nergous/sso_protos/gen/go/sso/auth/v1;ssoauthv1";

// ============================================================================
// TRANSPORT SECURITY REQUIREMENTS
// ============================================================================
// This API transports bearer tokens and plaintext password credentials.
//
// Conformance requirements:
//   - This service MUST be served only over TLS 1.2+ or mTLS.
//   - Plaintext gRPC / h2c / insecure transports are prohibited.
//   - Deployments exposing this API without transport encryption are
//     non-conformant.
//   - Clients SHOULD validate server certificates and hostname identity.
//
// The debug_redact annotations prevent accidental logging of secrets but do
// NOT provide transport confidentiality.
// ============================================================================

// ============================================================================
// LOGGING / SECRET REDACTION REQUIREMENTS
// ============================================================================
// Fields annotated with debug_redact contain sensitive credentials or tokens.
//
// The debug_redact option is schema metadata and does NOT guarantee runtime
// redaction by gRPC libraries.
//
// Conformance requirements:
//   - Servers and clients MUST configure logging interceptors / middleware
//     to honor debug_redact (or equivalent explicit field masking).
//   - Production deployments SHOULD disable request/response body logging for
//     AuthService methods entirely.
//   - Access tokens, refresh tokens, passwords, and authorization metadata
//     MUST NOT be written to application logs.
// ============================================================================

// ============================================================================
// AuthService - Authentication, Sessions, MFA, Recovery, Service Accounts
// ============================================================================
// Handles every credential-handling flow in SSO:
//   - global user registration
//   - per-app login (with optional MFA step) and session issuance
//   - token lifecycle (refresh, validate, revoke)
//   - self-service session management (list / revoke-all)
//   - password change and recovery-code-based password reset
//   - TOTP enrollment / confirmation / disablement
//   - service-account authentication (backend-to-backend)
//
// Token model:
//   access_token  - short-lived bearer credential (~15 min recommended)
//   refresh_token - long-lived rotation token used to obtain new access tokens
//   session_id    - server-side session handle, bearer-handle, redacted
//
// Both tokens encode app_id internally; Refresh / ValidateToken resolve the
// target app from the token itself - clients do not pass app_id separately.
//
// Token rotation:
//   Each Refresh issues a new refresh_token and invalidates the old one
//   (RFC 6819 mitigation against refresh-token replay).
//
// Login flow variants:
//   Single-factor (MFA not enrolled):
//     Login -> LoginResponse{tokens}
//   Two-factor (MFA enrolled):
//     Login -> LoginResponse{challenge}
//     CompleteMfaChallenge(challenge_id, code) -> AuthTokens
//
// Authentication requirements:
//   Public (no access_token): Register, Login, CompleteMfaChallenge,
//     Refresh, ValidateToken, ResetPasswordWithRecoveryCode,
//     AuthenticateServiceAccount
//   Authenticated: everything else (access_token via
//     `authorization: Bearer <access_token>` gRPC metadata).
// ============================================================================
service AuthService {

    // ------------------------------------------------------------------
    // Registration & login
    // ------------------------------------------------------------------

    // Register creates a new user identity in the global SSO directory
    // and returns it (AIP-133: Create RPCs return the created resource).
    //
    // Not scoped to any application; access to specific apps is granted
    // separately via AccessService (role grants).
    // Does NOT issue tokens - the client must call Login afterwards.
    //
    // User-enumeration mitigation:
    //   On ALREADY_EXISTS the server MUST NOT disclose which specific
    //   field (email vs username) collided. See
    //   sso.common.v1.ErrorReason.ERROR_REASON_USER_ALREADY_EXISTS.
    //
    // Errors:
    //   ALREADY_EXISTS     - email or username is already taken (opaque)
    //   INVALID_ARGUMENT   - email / username / display_name / password failed validation
    rpc Register(RegisterRequest) returns (sso.identity.v1.User);

    // Login authenticates a user against a specific app.
    //
    // If the user has no MFA enrolled, the response carries `tokens`
    // directly and the login is complete. If MFA is enrolled, the response
    // carries `challenge`; the client MUST then call CompleteMfaChallenge
    // with the challenge_id and an MFA code to obtain tokens.
    //
    // Errors:
    //   UNAUTHENTICATED     - invalid credentials
    //   NOT_FOUND           - app does not exist (by app_id or app_slug)
    //   FAILED_PRECONDITION - user is BLOCKED/DELETED or app is DISABLED/MAINTENANCE
    //   INVALID_ARGUMENT    - app_target / identifier / password failed validation
    //   RESOURCE_EXHAUSTED  - rate limit hit after repeated INVALID_CREDENTIALS
    rpc Login(LoginRequest) returns (LoginResponse);

    // CompleteMfaChallenge finalizes a two-factor login. Issues tokens on
    // success. The challenge_id is single-use and short-lived (~5 minutes);
    // after expiry the client must start a fresh Login.
    //
    // Errors:
    //   UNAUTHENTICATED     - invalid or expired challenge_id, or wrong code
    //   FAILED_PRECONDITION - challenge already consumed
    //   INVALID_ARGUMENT    - malformed code or unsupported method
    //   RESOURCE_EXHAUSTED  - too many code-verification attempts for this challenge
    rpc CompleteMfaChallenge(CompleteMfaChallengeRequest) returns (AuthTokens);

    // ------------------------------------------------------------------
    // Token lifecycle
    // ------------------------------------------------------------------

    // Logout invalidates the current session identified by the caller's
    // access_token in gRPC metadata. Idempotent.
    //
    // Errors:
    //   UNAUTHENTICATED     - missing, malformed, or expired access_token
    rpc Logout(google.protobuf.Empty) returns (google.protobuf.Empty);

    // Refresh exchanges a refresh_token for a new access/refresh pair.
    // The previous refresh_token is atomically invalidated (rotation).
    //
    // Errors:
    //   UNAUTHENTICATED     - refresh_token invalid, revoked, or expired
    //   INVALID_ARGUMENT    - refresh_token failed validation
    rpc Refresh(RefreshRequest) returns (AuthTokens);

    // ValidateToken introspects an access_token and returns its metadata.
    // On invalid / expired / revoked token, returns UNAUTHENTICATED - the
    // response is only populated for tokens that are currently valid.
    //
    // Errors:
    //   UNAUTHENTICATED     - access_token invalid, revoked, or expired
    //   INVALID_ARGUMENT    - access_token failed validation
    rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

    // RevokeSession terminates a session owned by the caller.
    // All tokens associated with the session are invalidated. Idempotent.
    //
    // Errors:
    //   UNAUTHENTICATED     - missing, malformed, or expired access_token
    //   PERMISSION_DENIED   - session_id does not belong to the caller
    //   NOT_FOUND           - session does not exist
    //   INVALID_ARGUMENT    - session_id is not a valid UUID
    rpc RevokeSession(RevokeSessionRequest) returns (google.protobuf.Empty);

    // RevokeToken invalidates a refresh_token chain. All currently outstanding
    // access_tokens derived from it stop validating on the next ValidateToken
    // call. Idempotent.
    //
    // Errors:
    //   UNAUTHENTICATED     - missing, malformed, or expired access_token
    //   INVALID_ARGUMENT    - refresh_token failed validation
    rpc RevokeToken(RevokeTokenRequest) returns (google.protobuf.Empty);

    // ------------------------------------------------------------------
    // Session management (user-facing)
    // ------------------------------------------------------------------

    // ListSessions returns the caller's currently active sessions, across
    // all apps. Lets the user see which devices/browsers are logged in.
    //
    // Errors:
    //   UNAUTHENTICATED - missing/invalid access_token
    rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

    // RevokeAllSessions terminates every session owned by the caller.
    // By default the current session (the one that made this call) is
    // also revoked - i.e. "log out everywhere". Set
    // except_current=true for "log out everywhere except here".
    //
    // Errors:
    //   UNAUTHENTICATED - missing/invalid access_token
    rpc RevokeAllSessions(RevokeAllSessionsRequest) returns (google.protobuf.Empty);

    // ------------------------------------------------------------------
    // Password: change / reset
    // ------------------------------------------------------------------

    // ChangePassword replaces the caller's password. The current password
    // must be supplied as proof of identity - this guards against account
    // takeover via a stolen session/token.
    //
    // Token rotation: on success, ALL of the caller's sessions are
    // revoked (including the one that made this call), and a fresh
    // (access_token, refresh_token) pair is issued inline in the
    // response. The client MUST replace its tokens.
    //
    // Rate-limiting (REQUIRED server-side): see ERROR_REASON_PASSWORD_MISMATCH.
    //
    // Errors:
    //   UNAUTHENTICATED     - access_token missing/invalid (INVALID_TOKEN)
    //                         OR old_password did not match (PASSWORD_MISMATCH)
    //   RESOURCE_EXHAUSTED  - rate limit hit after repeated PASSWORD_MISMATCH
    //   INVALID_ARGUMENT    - new_password failed policy validation
    //                         OR new_password equals old_password
    //   FAILED_PRECONDITION - user is BLOCKED or DELETED
    rpc ChangePassword(ChangePasswordRequest) returns (AuthTokens);

    // ResetPasswordWithRecoveryCode lets a user who forgot their password
    // set a new one using one of the recovery codes previously issued by
    // GenerateRecoveryCodes. PUBLIC endpoint (no access_token required).
    //
    // On success:
    //   - the used recovery code is consumed (single-use);
    //   - ALL of the user's existing sessions are revoked;
    //   - a fresh session is issued inline (same shape as Login).
    //
    // Rate-limiting (REQUIRED server-side): this endpoint accepts
    // unauthenticated (identifier, code) pairs and is a prime target for
    // brute-force. Servers MUST enforce aggressive per-identifier and
    // per-IP throttling with exponential backoff.
    //
    // Errors:
    //   UNAUTHENTICATED     - identifier/code combination does not match
    //   NOT_FOUND           - identifier does not resolve to a user
    //   FAILED_PRECONDITION - user is BLOCKED or DELETED
    //   RESOURCE_EXHAUSTED  - rate limit hit
    //   INVALID_ARGUMENT    - new_password failed policy validation
    rpc ResetPasswordWithRecoveryCode(ResetPasswordWithRecoveryCodeRequest) returns (AuthTokens);

    // ------------------------------------------------------------------
    // Recovery codes (self-service)
    // ------------------------------------------------------------------

    // GenerateRecoveryCodes issues a fresh batch of 10 one-time recovery
    // codes for the caller. ANY previously issued codes are invalidated
    // atomically. Codes are SHOWN ONLY ONCE in the response; the server
    // retains only salted hashes and cannot re-display them.
    //
    // Recovery codes serve a dual purpose:
    //   1. Offline password reset (ResetPasswordWithRecoveryCode).
    //   2. MFA bypass (CompleteMfaChallenge with method=RECOVERY_CODE).
    //
    // Errors:
    //   UNAUTHENTICATED     - missing/invalid access_token
    //   FAILED_PRECONDITION - user is BLOCKED or DELETED
    rpc GenerateRecoveryCodes(google.protobuf.Empty) returns (RecoveryCodesResponse);

    // ------------------------------------------------------------------
    // MFA (TOTP, RFC 6238)
    // ------------------------------------------------------------------

    // EnrollTotp begins TOTP enrollment. Generates a fresh secret and
    // returns it (plus an otpauth:// URL the client renders as a QR
    // code). TOTP is NOT yet active after this call - the client MUST
    // follow up with ConfirmTotpEnrollment to prove the secret was
    // correctly recorded in the authenticator app.
    //
    // If the user has an unconfirmed enrollment from a previous call,
    // it is atomically replaced.
    //
    // Errors:
    //   UNAUTHENTICATED     - missing/invalid access_token
    //   FAILED_PRECONDITION - TOTP already enrolled and active (disable first)
    rpc EnrollTotp(google.protobuf.Empty) returns (TotpEnrollmentResponse);

    // ConfirmTotpEnrollment activates a pending TOTP enrollment by
    // verifying a live 6-digit code generated from the secret. After
    // success, subsequent Logins will require MFA.
    //
    // Errors:
    //   UNAUTHENTICATED     - missing/invalid access_token
    //   FAILED_PRECONDITION - no pending enrollment
    //   INVALID_ARGUMENT    - code is not 6 digits
    //   PERMISSION_DENIED   - code did not match (treat as
    //                         ERROR_REASON_MFA_CODE_INVALID)
    rpc ConfirmTotpEnrollment(ConfirmTotpEnrollmentRequest) returns (google.protobuf.Empty);

    // DisableTotp removes TOTP from the caller's account. Requires
    // proof-of-possession: a valid TOTP code OR a valid recovery code.
    // This prevents an attacker holding only a stolen access_token from
    // silently stripping MFA.
    //
    // Errors:
    //   UNAUTHENTICATED     - missing/invalid access_token
    //   FAILED_PRECONDITION - TOTP is not enrolled
    //   PERMISSION_DENIED   - proof code did not match
    //                         (ERROR_REASON_MFA_CODE_INVALID)
    //   INVALID_ARGUMENT    - proof code is neither 6 digits nor a recovery code
    rpc DisableTotp(DisableTotpRequest) returns (google.protobuf.Empty);

    // ------------------------------------------------------------------
    // Service-account authentication
    // ------------------------------------------------------------------

    // AuthenticateServiceAccount exchanges a (client_id, client_secret)
    // pair for AuthTokens, analogous to OAuth2 client_credentials grant.
    // Service accounts are managed in sso.serviceaccount.v1.
    //
    // The issued access_token has subject = service_account:{id} instead
    // of user:{id}; downstream authorization (roles, CheckPermission)
    // works identically.
    //
    // Errors:
    //   UNAUTHENTICATED     - invalid client_id / client_secret combo
    //   FAILED_PRECONDITION - service account is DISABLED, or target app is
    //                         DISABLED/MAINTENANCE
    //   NOT_FOUND           - target app does not exist
    //   INVALID_ARGUMENT    - app_target / credentials failed validation
    //   RESOURCE_EXHAUSTED  - rate limit hit
    rpc AuthenticateServiceAccount(ServiceAccountAuthRequest) returns (AuthTokens);
}

// ============================================================================
// AuthTokens - the credential bundle issued on successful authentication
// ============================================================================
// Returned by every RPC that establishes or rotates a session:
//   Login (on single-factor path), CompleteMfaChallenge, Refresh,
//   ChangePassword, ResetPasswordWithRecoveryCode, AuthenticateServiceAccount.
message AuthTokens {
    // Short-lived bearer credential.
    string access_token = 1 [debug_redact = true];

    // Long-lived rotation token. Send back in RefreshRequest.refresh_token
    // to obtain a new access/refresh pair.
    string refresh_token = 2 [debug_redact = true];

    // Subject of the token: for user sessions, the user UUID; for
    // service-account sessions, the service-account UUID. The concrete
    // type is recoverable from ValidateTokenResponse.subject_type.
    string subject_id = 3;

    // UUID of the server-side session backing these tokens. Bearer-handle;
    // redacted from debug dumps.
    string session_id = 4 [debug_redact = true];

    // Expiration timestamp of access_token.
    google.protobuf.Timestamp access_token_expires_at = 5;

    // Advisory expiration time of current refresh_token. Subject to
    // earlier revocation, password change, admin action, inactivity
    // timeout, or token rotation.
    google.protobuf.Timestamp refresh_token_expires_at = 6;
}

// ============================================================================
// DeviceInfo - optional client metadata captured on Login
// ============================================================================
// Helps users identify their sessions in ListSessions. Servers SHOULD
// augment user-supplied values with authoritative ones (e.g. IP from the
// gRPC peer, user-agent from metadata).
message DeviceInfo {
    // Raw User-Agent string. Max 512 chars to accommodate modern UAs.
    string user_agent = 1 [(buf.validate.field).string.max_len = 512];

    // Client IP address. Server OVERRIDES with the authoritative peer
    // address; client-supplied value is ignored (prevents spoofing).
    // Output-only from the client's perspective.
    string ip_address = 2 [(buf.validate.field).string.max_len = 45];

    // Free-form device-name label from the client (e.g. "Dmitry's iPhone").
    // Optional; shown to the user in ListSessions UI.
    string device_name = 3 [(buf.validate.field).string.max_len = 128];

    // ISO 3166-1 alpha-2 country code derived server-side from ip_address.
    // Output-only.
    string country_code = 4 [(buf.validate.field).string.max_len = 2];
}

// ============================================================================
// RegisterRequest - payload for Register RPC
// ============================================================================
message RegisterRequest {
    // User email address (RFC 5321, max 254 chars). Must be unique.
    string email = 1 [
        (buf.validate.field).string.email = true,
        (buf.validate.field).string.max_len = 254
    ];

    // Unique username (1-128 chars).
    string username = 2 [
        (buf.validate.field).string.min_len = 1,
        (buf.validate.field).string.max_len = 128
    ];

    // Human-readable display name (1-128 chars, non-unique).
    string display_name = 3 [
        (buf.validate.field).string.min_len = 1,
        (buf.validate.field).string.max_len = 128
    ];

    // Plaintext password (12-64 chars). Server enforces additional
    // complexity rules; never logged or echoed back.
    // Transmitted only over TLS-protected transport.
    string password = 4 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 12,
        (buf.validate.field).string.max_len = 64
    ];
}

// ============================================================================
// LoginRequest - payload for Login RPC
// ============================================================================
message LoginRequest {
    // Target application. Either the UUID or the URL-safe slug.
    oneof app_target {
        option (buf.validate.oneof).required = true;
        string app_id = 1 [(buf.validate.field).string.uuid = true];
        string app_slug = 2 [
            (buf.validate.field).string.pattern = "^[a-z][a-z0-9-]{2,63}$"
        ];
    }

    // User identifier. Either email or username.
    oneof identifier {
        option (buf.validate.oneof).required = true;
        string email = 3 [(buf.validate.field).string.email = true];
        string username = 4 [
            (buf.validate.field).string.min_len = 1,
            (buf.validate.field).string.max_len = 128
        ];
    }

    // Plaintext password (12-64 chars). Same policy as RegisterRequest.
    // Transmitted only over TLS-protected transport.
    string password = 5 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 12,
        (buf.validate.field).string.max_len = 64
    ];

    // Optional client-supplied device metadata for session attribution.
    // The server MUST override DeviceInfo.ip_address with the peer's
    // authoritative IP; client-supplied ip_address is ignored.
    DeviceInfo device = 6;
}

// ============================================================================
// LoginResponse - either tokens (single-factor) or MFA challenge
// ============================================================================
// Callers MUST check which oneof branch is set:
//   result.tokens    -> authentication complete, use tokens
//   result.challenge -> MFA required, call CompleteMfaChallenge next
message LoginResponse {
    oneof result {
        AuthTokens tokens = 1;
        MfaChallenge challenge = 2;
    }
}

// ============================================================================
// MfaChallenge - issued by Login when the user has MFA enrolled
// ============================================================================
message MfaChallenge {
    // Opaque identifier for the pending partial-authentication state.
    // Single-use; expires at `expires_at` (~5 minutes after Login).
    // Bearer-handle: redacted from debug dumps.
    string challenge_id = 1 [debug_redact = true];

    // MFA methods the user has enrolled. Client picks one and passes
    // it to CompleteMfaChallenge. A user with TOTP enabled is guaranteed
    // to see both TOTP and RECOVERY_CODE here (recovery codes are always
    // available as fallback).
    repeated MfaMethod available_methods = 2;

    // Challenge expiry. After this time the challenge_id is no longer
    // accepted; the client must start a fresh Login.
    google.protobuf.Timestamp expires_at = 3;
}

// ============================================================================
// MfaMethod - ways a user can satisfy the second factor
// ============================================================================
enum MfaMethod {
    MFA_METHOD_UNSPECIFIED = 0;

    // 6-digit time-based one-time password (RFC 6238).
    MFA_METHOD_TOTP = 1;

    // One-time recovery code from GenerateRecoveryCodes. Consumed on use.
    MFA_METHOD_RECOVERY_CODE = 2;

    // Reserved for future methods (WebAuthn/FIDO2, push notifications, etc.).
    reserved 100 to 199;
}

// ============================================================================
// CompleteMfaChallengeRequest - second factor
// ============================================================================
message CompleteMfaChallengeRequest {
    // The challenge_id from LoginResponse.challenge.
    string challenge_id = 1 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 1
    ];

    // Which method the client is completing with.
    MfaMethod method = 2 [(buf.validate.field).enum.defined_only = true];

    // Verification code.
    //   TOTP:          exactly 6 ASCII digits
    //   RECOVERY_CODE: "XXXX-XXXX-XXXX" (14 chars, hyphens between groups
    //                  of 4 alphanumerics; server-side normalization
    //                  accepts codes without hyphens too).
    string code = 3 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 6,
        (buf.validate.field).string.max_len = 32
    ];
}

// ============================================================================
// RefreshRequest - payload for Refresh RPC
// ============================================================================
// The target application is encoded inside the refresh_token and resolved
// server-side; clients do not pass app_id separately.
message RefreshRequest {
    // Refresh token previously issued by Login or an earlier Refresh.
    string refresh_token = 1 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 1
    ];
}

// ============================================================================
// ValidateTokenRequest - payload for ValidateToken RPC
// ============================================================================
// The target application is encoded inside the access_token and resolved
// server-side; clients do not pass app_id separately.
message ValidateTokenRequest {
    // Access token to introspect.
    string access_token = 1 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 1
    ];
}

// ============================================================================
// ValidateTokenResponse - metadata of a valid access_token
// ============================================================================
// Only returned when the token is valid; invalid / expired / revoked tokens
// surface as UNAUTHENTICATED gRPC errors without a response body.
message ValidateTokenResponse {
    // Subject UUID (user or service account). See subject_type.
    string subject_id = 1;

    // What the subject is.
    SubjectType subject_type = 2;

    // UUID of the server-side session backing this token.
    // Bearer-handle; redacted from debug dumps.
    string session_id = 3 [debug_redact = true];

    // Token expiration timestamp.
    google.protobuf.Timestamp expires_at = 4;

    // UUID of the app the token was issued for. Downstream services MUST
    // check this against their own app_id before trusting the token -
    // a token issued for app A is not valid for app B even if the
    // signature verifies.
    string app_id = 5;
}

// ============================================================================
// SubjectType - what kind of identity a token represents
// ============================================================================
enum SubjectType {
    SUBJECT_TYPE_UNSPECIFIED = 0;
    SUBJECT_TYPE_USER = 1;
    SUBJECT_TYPE_SERVICE_ACCOUNT = 2;

    // Reserved for future subject kinds (e.g. federated external identities).
    reserved 100 to 199;
}

// ============================================================================
// RevokeSessionRequest - payload for RevokeSession RPC
// ============================================================================
message RevokeSessionRequest {
    // UUID of the session to revoke. Must belong to the calling user
    // (ownership is verified server-side against the caller's access_token).
    // Bearer-handle: redacted from debug dumps.
    string session_id = 1 [
        debug_redact = true,
        (buf.validate.field).string.uuid = true
    ];
}

// ============================================================================
// RevokeTokenRequest - payload for RevokeToken RPC
// ============================================================================
message RevokeTokenRequest {
    // Refresh token to revoke. All access_tokens derived from it stop
    // validating on the next ValidateToken call.
    string refresh_token = 1 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 1
    ];
}

// ============================================================================
// ListSessionsRequest - paginated list of the caller's sessions
// ============================================================================
message ListSessionsRequest {
    // Page size (0-100). 0 means server default. Capped lower than other
    // List* endpoints because typical users have O(10) sessions, not O(1000).
    int32 page_size = 1 [
        (buf.validate.field).int32.gte = 0,
        (buf.validate.field).int32.lte = 100
    ];

    // Opaque pagination token. Empty = first page.
    string page_token = 2;
}

// ============================================================================
// ListSessionsResponse
// ============================================================================
message ListSessionsResponse {
    repeated SessionInfo sessions = 1;
    string next_page_token = 2;
    optional int32 total_size = 3;
}

// ============================================================================
// SessionInfo - one session as displayed to the session owner
// ============================================================================
message SessionInfo {
    // UUID of the session. Bearer-handle: redacted from debug dumps.
    string session_id = 1 [debug_redact = true];

    // App the session was issued for.
    string app_id = 2;

    // When the session was created (last Login or ChangePassword).
    google.protobuf.Timestamp created_at = 3;

    // Last observed activity (any authenticated RPC, any ValidateToken).
    google.protobuf.Timestamp last_seen_at = 4;

    // Hard expiry of the session (refresh_token expiry).
    google.protobuf.Timestamp expires_at = 5;

    // Device metadata captured at Login. Fields may be empty if the
    // client did not supply them and the server could not infer them.
    DeviceInfo device = 6;

    // True for the session that issued this ListSessions call. The
    // caller's own session is always returned as part of the list; this
    // flag lets the UI highlight it and disable "revoke" on that row.
    bool is_current = 7;
}

// ============================================================================
// RevokeAllSessionsRequest - payload for RevokeAllSessions
// ============================================================================
message RevokeAllSessionsRequest {
    // When true, keep the session making this call alive ("log out
    // everywhere except here"). When false (default), ALL sessions
    // including the current one are revoked and the caller must Login
    // again.
    bool except_current = 1;
}

// ============================================================================
// ChangePasswordRequest - payload for ChangePassword RPC
// ============================================================================
// The target user is identified by the caller's access_token in gRPC
// metadata; callers can only change their own password.
message ChangePasswordRequest {
    // The caller's current password. Required as a proof-of-identity
    // check independent of the access_token. Same length policy as
    // LoginRequest.password (12-64 chars).
    string old_password = 1 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 12,
        (buf.validate.field).string.max_len = 64
    ];

    // The new password (12-64 chars). Must differ from old_password;
    // server enforces additional complexity rules.
    // Transmitted only over TLS-protected transport.
    string new_password = 2 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 12,
        (buf.validate.field).string.max_len = 64
    ];
}

// ============================================================================
// ResetPasswordWithRecoveryCodeRequest - unauthenticated password reset
// ============================================================================
message ResetPasswordWithRecoveryCodeRequest {
    // Target user identifier (email or username).
    oneof identifier {
        option (buf.validate.oneof).required = true;
        string email = 1 [(buf.validate.field).string.email = true];
        string username = 2 [
            (buf.validate.field).string.min_len = 1,
            (buf.validate.field).string.max_len = 128
        ];
    }

    // Target app for the freshly-issued session. Either app_id or app_slug.
    oneof app_target {
        option (buf.validate.oneof).required = true;
        string app_id = 3 [(buf.validate.field).string.uuid = true];
        string app_slug = 4 [
            (buf.validate.field).string.pattern = "^[a-z][a-z0-9-]{2,63}$"
        ];
    }

    // One of the user's unused recovery codes. Consumed on success.
    // Server-side normalization: hyphens are optional, case-insensitive.
    string recovery_code = 5 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 8,
        (buf.validate.field).string.max_len = 32
    ];

    // The new password. Same policy as Register / ChangePassword.
    string new_password = 6 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 12,
        (buf.validate.field).string.max_len = 64
    ];
}

// ============================================================================
// RecoveryCodesResponse - one-time recovery codes, shown once
// ============================================================================
// The codes below are displayed to the user exactly once. The server
// stores only salted hashes and cannot re-display them; a new batch
// fully supersedes the previous batch.
message RecoveryCodesResponse {
    // Typically 10 codes in the form "XXXX-XXXX-XXXX" (14 chars).
    // Alphabet is restricted to unambiguous characters to reduce
    // transcription errors (no 0/O, 1/I/l confusion).
    repeated string codes = 1 [
        debug_redact = true,
        (buf.validate.field).repeated.min_items = 1,
        (buf.validate.field).repeated.max_items = 20
    ];

    // When the batch was generated. Useful for the UI to tell the user
    // "these codes were generated on <date>".
    google.protobuf.Timestamp generated_at = 2;
}

// ============================================================================
// TotpEnrollmentResponse - begin TOTP enrollment
// ============================================================================
// The secret is shown ONCE. The client renders otpauth_url as a QR code.
// Enrollment is NOT active until ConfirmTotpEnrollment verifies a live code.
message TotpEnrollmentResponse {
    // Base32-encoded TOTP secret (RFC 6238). Typically 26-32 chars for
    // a 128-bit / 160-bit secret. Shown once.
    string secret_base32 = 1 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 16,
        (buf.validate.field).string.max_len = 64
    ];

    // otpauth:// URL encoding issuer, account name, secret, algorithm,
    // digits, and period. Clients render this as a QR code for the user
    // to scan with their TOTP app.
    // Example: otpauth://totp/nergous.ru:alice@example.com?secret=...&issuer=nergous.ru
    string otpauth_url = 2 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 1
    ];
}

// ============================================================================
// ConfirmTotpEnrollmentRequest - activate a pending TOTP enrollment
// ============================================================================
message ConfirmTotpEnrollmentRequest {
    // Live 6-digit TOTP code generated from the just-issued secret.
    string code = 1 [
        debug_redact = true,
        (buf.validate.field).string.pattern = "^[0-9]{6}$"
    ];
}

// ============================================================================
// DisableTotpRequest - tear down TOTP for the caller
// ============================================================================
message DisableTotpRequest {
    // Proof-of-possession: EITHER a current 6-digit TOTP code OR a
    // one-time recovery code. Required to prevent an attacker with only
    // a stolen access_token from silently stripping MFA.
    string code = 1 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 6,
        (buf.validate.field).string.max_len = 32
    ];
}

// ============================================================================
// ServiceAccountAuthRequest - OAuth2 client_credentials grant
// ============================================================================
// Service-account credentials are issued and managed via
// sso.serviceaccount.v1.ServiceAccountService. This RPC exchanges them
// for AuthTokens on the user-auth surface.
message ServiceAccountAuthRequest {
    // Public identifier of the service account.
    string client_id = 1 [
        (buf.validate.field).string.min_len = 1,
        (buf.validate.field).string.max_len = 128
    ];

    // Secret issued alongside the client_id. Shown only once at creation;
    // can be rotated via ServiceAccountService.RotateCredentials.
    string client_secret = 2 [
        debug_redact = true,
        (buf.validate.field).string.min_len = 1
    ];

    // Target app. Either app_id or app_slug.
    oneof app_target {
        option (buf.validate.oneof).required = true;
        string app_id = 3 [(buf.validate.field).string.uuid = true];
        string app_slug = 4 [
            (buf.validate.field).string.pattern = "^[a-z][a-z0-9-]{2,63}$"
        ];
    }
}
