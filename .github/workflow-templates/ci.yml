name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: go mod tidy (check)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

  buf:
    name: Buf lint & breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-setup-action@v1

      - name: buf lint
        run: buf lint

      - name: buf breaking
        if: github.event_name == 'pull_request'
        run: buf breaking --against "${{ github.event.pull_request.base.repo.clone_url }}#branch=${{ github.event.pull_request.base.ref }}"
