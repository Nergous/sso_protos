syntax = "proto3";

package sso.auth.v2;

option go_package = "nergous.sso.v2;ssov2";

// Auth is the authentication service of the nergous.ru SSO platform.
// It covers user registration, credential-based sign-in, session termination
// and token lifecycle management (refresh, validation).
service Auth {
    // Register creates a new user account and returns its numeric identifier.
    rpc Register (RegisterRequest) returns (RegisterResponse);

    // Login authenticates a user by email + password in the context of a
    // specific app_id and returns an access/refresh token pair.
    rpc Login (LoginRequest) returns (LoginResponse);

    // Logout invalidates the caller's access token. Idempotent.
    rpc Logout (LogoutRequest) returns (LogoutResponse);

    // Refresh issues a new access/refresh token pair from a valid refresh token.
    rpc Refresh (RefreshRequest) returns (LoginResponse);

    // ValidateToken verifies an access token and returns the owning user_id
    // plus a boolean `valid` flag.
    rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
}

// RegisterRequest carries the data required to create a new user.
message RegisterRequest {
    // User's email. Must be unique per deployment. Used as the login identifier.
    string email = 1;
    // Plaintext password. MUST be transmitted over TLS only — do not log.
    string password = 2;
    // Optional Steam profile URL.
    string steam_url = 3;
    // Optional path/URL to the user's avatar.
    string path_to_photo = 4;
}

// RegisterResponse returns the identifier of the freshly created user.
message RegisterResponse {
    // Numeric user identifier assigned by the server.
    uint32 user_id = 1;
}

// LoginRequest authenticates a user against a specific registered app.
message LoginRequest {
    // User's email.
    string email = 1;
    // Plaintext password. MUST be transmitted over TLS only — do not log.
    string password = 2;
    // Identifier of the app the user is signing into. Determines token audience.
    uint32 app_id = 3;
}

// LoginResponse carries the token pair issued after a successful login.
message LoginResponse {
    // Short-lived JWT used to authenticate subsequent RPCs.
    string access_token = 1;
    // Long-lived token used to obtain new access tokens via Refresh.
    string refresh_token = 2;
}

// LogoutRequest invalidates the provided access token.
message LogoutRequest {
    // Access token to invalidate.
    string token = 1;
}

// LogoutResponse is intentionally empty.
message LogoutResponse {}

// RefreshRequest trades a refresh token for a new access/refresh pair.
message RefreshRequest {
    // Refresh token previously issued by Login/Refresh.
    string refresh_token = 1;
}

// ValidateTokenRequest checks whether an access token is currently valid.
message ValidateTokenRequest {
    // Access token to validate.
    string token = 1;
}

// ValidateTokenResponse reports the outcome of a token validation request.
message ValidateTokenResponse {
    // Identifier of the user the token was issued for. 0 if invalid.
    uint32 user_id = 1;
    // True if the token is currently valid (not expired, not revoked).
    bool valid = 2;
}
